name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [created]
  # Manual trigger from the Actions tab — produces the same artifacts as a
  # push to main and republishes the rolling `latest` release. Useful when
  # the Android team needs a fresh build without waiting for a new commit.
  workflow_dispatch:

# Единый Cargo cache key для всех jobs.
env:
  CARGO_TERM_COLOR: always
  UNIFFI_VERSION: "0.30.0"

jobs:
  # ── 1. Lint + Unit tests (Linux, быстро) ──────────────────────────────────
  test:
    name: Lint + Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      # construct-core has a path dependency on construct-veil
      # (`construct-veil = { path = "../construct-veil", optional = true }`).
      # Even when the `ios`/`mac`/`android` features are off, `cargo metadata`
      # (used by `cargo fmt`, `cargo clippy`, etc.) still reads
      # `../construct-veil/Cargo.toml` to validate the dependency graph.
      # Without this sibling checkout, the very first lint step fails.
      - name: Checkout construct-veil (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/construct-veil
          path: construct-veil

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          path: construct-core

      # Honors construct-core/rust-toolchain.toml — installs the pinned channel,
      # all listed cross-compile targets, and rustfmt/clippy components.
      - name: Install pinned Rust toolchain
        working-directory: construct-core
        run: rustup show

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-core/target/
          key: linux-cargo-${{ hashFiles('construct-core/Cargo.lock', 'construct-veil/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Check formatting
        working-directory: construct-core
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        working-directory: construct-core
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (post-quantum)
        working-directory: construct-core
        run: cargo clippy --all-targets --features post-quantum -- -D warnings

      - name: Run tests (default)
        working-directory: construct-core
        run: cargo test

      - name: Run tests (post-quantum)
        working-directory: construct-core
        run: cargo test --features post-quantum

  # ── 2. iOS cross-compilation + Swift bindings (macOS) ────────────────────
  build-ios:
    name: iOS Cross-compile + Swift bindings
    runs-on: macos-14 # Apple Silicon runner — faster Rust compilation
    needs: test
    steps:
      # construct-core's `ios`/`mac` features depend on construct-veil via a
      # path = "../construct-veil" dependency, so we check it out as a sibling.
      - name: Checkout construct-veil (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/construct-veil
          path: construct-veil

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          path: construct-core

      # Honors construct-core/rust-toolchain.toml — installs the pinned channel
      # and all cross-compile targets (iOS + macOS + Android — `rustup show`
      # is single-toolchain-file-driven, no per-job target list needed).
      - name: Install pinned Rust toolchain
        working-directory: construct-core
        run: rustup show

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-core/target/
          key: macos-cargo-ios-${{ hashFiles('construct-core/Cargo.lock', 'construct-veil/Cargo.lock') }}
          restore-keys: macos-cargo-ios-

      # The `uniffi-bindgen` binary ships with the `uniffi` crate behind its
      # `cli` feature. The standalone `uniffi-bindgen-cli` crate referenced by
      # the previous workflow does not exist on crates.io.
      - name: Install uniffi-bindgen v${{ env.UNIFFI_VERSION }}
        run: |
          cargo install uniffi \
            --force \
            --version ${{ env.UNIFFI_VERSION }} \
            --features cli \
            --locked \
            --quiet

      # cargo check validates the full dependency graph without linking —
      # much faster than cargo build for a cross-compilation sanity check.
      - name: Check iOS device target (aarch64-apple-ios)
        working-directory: construct-core
        run: cargo check --features ios --target aarch64-apple-ios

      - name: Check iOS simulator target (aarch64-apple-ios-sim)
        working-directory: construct-core
        run: cargo check --features ios --target aarch64-apple-ios-sim

      - name: Check mac target (aarch64-apple-darwin)
        working-directory: construct-core
        run: cargo check --features mac

      # UDL gate: generate Swift bindings and detect drift.
      # If this diff is non-empty, a developer changed the UDL without
      # regenerating construct_core.swift in construct-veil clients.
      - name: Generate Swift bindings
        working-directory: construct-core
        run: |
          uniffi-bindgen generate \
            src/construct_core.udl \
            --language swift \
            --out-dir /tmp/bindings

      - name: Upload generated Swift bindings
        uses: actions/upload-artifact@v4
        with:
          name: swift-bindings-${{ github.sha }}
          path: /tmp/bindings/
          retention-days: 7

  # ── 3. Android cross-compilation + Kotlin bindings (Linux) ───────────────
  # Produces .so binaries for the three NDK ABIs Android Studio expects
  # under app/src/main/jniLibs/ plus auto-generated Kotlin UniFFI bindings.
  # Android developers consume the released archive instead of running
  # NDK + Rust + uniffi-bindgen locally.
  build-android:
    name: Android Cross-compile + Kotlin bindings
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout construct-veil (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/construct-veil
          path: construct-veil

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          path: construct-core

      - name: Install pinned Rust toolchain
        working-directory: construct-core
        run: rustup show

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-core/target/
          key: linux-cargo-android-${{ hashFiles('construct-core/Cargo.lock', 'construct-veil/Cargo.lock') }}
          restore-keys: linux-cargo-android-

      # Ubuntu GitHub runners ship the Android NDK pre-installed; cargo-ndk
      # autodetects it via $ANDROID_NDK_LATEST_HOME.
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked --quiet

      - name: Install uniffi-bindgen v${{ env.UNIFFI_VERSION }}
        run: |
          cargo install uniffi \
            --force \
            --version ${{ env.UNIFFI_VERSION }} \
            --features cli \
            --locked \
            --quiet

      # Build all three ABIs in one cargo-ndk invocation. `-o jniLibs/` lays the
      # output out exactly as Android Studio expects under
      # app/src/main/jniLibs/<abi>/libconstruct_core.so.
      - name: Build .so for arm64-v8a, armeabi-v7a, x86_64
        working-directory: construct-core
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -t x86_64 \
            -o ../android-out/jniLibs \
            build --release --features "android,post-quantum"

      # UniFFI library-mode binding generation — the arm64 .so is the
      # canonical artifact (all ABIs share one UDL, so bindings are identical).
      - name: Generate Kotlin bindings
        working-directory: construct-core
        run: |
          mkdir -p ../android-out/kotlin
          uniffi-bindgen generate \
            --library ../android-out/jniLibs/arm64-v8a/libconstruct_core.so \
            --language kotlin \
            --out-dir ../android-out/kotlin

      - name: Write README for Android devs
        run: |
          cat > android-out/README.md <<'EOF'
          # construct-core for Android

          Drop-in artifact for Android Studio projects.

          ## Install

          1. Copy `jniLibs/` into `app/src/main/`:
             ```
             app/src/main/jniLibs/
                ├── arm64-v8a/libconstruct_core.so
                ├── armeabi-v7a/libconstruct_core.so
                └── x86_64/libconstruct_core.so
             ```
          2. Copy `kotlin/uniffi/construct_core/construct_core.kt` (and any
             sibling files generated under `kotlin/uniffi/`) into your Kotlin
             crypto package (e.g. `app/src/main/java/.../crypto/`).
          3. Build the app — no other Gradle changes required.

          ## Features compiled in
          - `android` (UniFFI Kotlin bindings, construct-veil transport)
          - `post-quantum` (Kyber-768 OTPK, ML-DSA signing)

          ## Versioning
          The archive name includes the construct-core commit SHA.
          Verify by running `strings libconstruct_core.so | grep CONSTRUCT_CORE_VERSION`.
          EOF

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ github.sha }}
          path: android-out/
          retention-days: 7

  # ── 4. Release ────────────────────────────────────────────────────────────
  # Publishes two kinds of releases:
  #   * Tagged release (`release` event)   — versioned (e.g. `v0.9.1`), full release.
  #   * Rolling pre-release (`push` to main or `workflow_dispatch`) — single fixed
  #     tag `latest`, force-updated on every run. Gives integrators a stable URL:
  #       https://github.com/<owner>/construct-core/releases/download/latest/construct-core-android.tar.gz
  #     so Android & iOS devs don't have to navigate the Actions tab.
  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    # Required so softprops/action-gh-release can create/update releases.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: swift-bindings-${{ github.sha }}
          path: release/ios/

      - uses: actions/download-artifact@v4
        with:
          name: android-${{ github.sha }}
          path: release/android/

      - name: Create archives
        run: |
          cd release
          tar -czf construct-core-ios-bindings.tar.gz ios/
          tar -czf construct-core-android.tar.gz android/

      # Compute release params depending on trigger.
      #   * release event   → use the human-supplied tag, full release.
      #   * push / dispatch → fixed `latest` tag, marked prerelease (rolling).
      - name: Resolve release tag and type
        id: relinfo
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "release_name=${{ github.event.release.name || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=latest" >> "$GITHUB_OUTPUT"
            echo "release_name=Latest rolling build" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release notes
        run: |
          cat > release/notes.md <<EOF
          ## Construct Core — \`${{ steps.relinfo.outputs.tag_name }}\`

          Built from commit [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA}).

          ### Downloads

          | Platform | File | Stable URL |
          |---|---|---|
          | iOS | \`construct-core-ios-bindings.tar.gz\` | <https://github.com/${{ github.repository }}/releases/download/${{ steps.relinfo.outputs.tag_name }}/construct-core-ios-bindings.tar.gz> |
          | Android | \`construct-core-android.tar.gz\` | <https://github.com/${{ github.repository }}/releases/download/${{ steps.relinfo.outputs.tag_name }}/construct-core-android.tar.gz> |

          ### Android drop-in

          \`\`\`bash
          curl -L -o construct-core-android.tar.gz \\
            https://github.com/${{ github.repository }}/releases/download/${{ steps.relinfo.outputs.tag_name }}/construct-core-android.tar.gz
          tar -xzf construct-core-android.tar.gz
          # then follow README.md inside the extracted directory
          \`\`\`

          The Android archive contains \`libconstruct_core.so\` for
          \`arm64-v8a\`, \`armeabi-v7a\`, and \`x86_64\` plus auto-generated
          Kotlin UniFFI bindings.

          Related repository: [construct-veil](https://github.com/${{ github.repository_owner }}/construct-veil)
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relinfo.outputs.tag_name }}
          name: ${{ steps.relinfo.outputs.release_name }}
          body_path: release/notes.md
          prerelease: ${{ steps.relinfo.outputs.prerelease == 'true' }}
          # Rolling release overwrites the same tag every time.
          # softprops/action-gh-release@v2 supports this via `files:` replacement
          # when the release already exists; combined with the fixed tag, this
          # gives integrators a never-changing download URL for the latest build.
          files: |
            release/construct-core-ios-bindings.tar.gz
            release/construct-core-android.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
