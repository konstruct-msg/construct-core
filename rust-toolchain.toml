# Pinned toolchain. Bumping in lockstep with construct-veil's
# rust-toolchain.toml keeps `cargo metadata` resolution deterministic across
# the workspace (construct-core depends on construct-veil via
# `path = "../construct-veil"`).
#
# `targets =` is listed here so `rustup` (and `rustup show`) auto-install the
# cross-compile std libs on first invocation — both locally and in CI. This
# is the single source of truth for which platforms construct-core supports.
#
# When bumping the channel: run
#   cargo clippy --all-targets -- -D warnings
#   cargo clippy --all-targets --features post-quantum -- -D warnings
# locally first to catch new-default lints before CI fails on them.

[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
targets = [
    "aarch64-apple-ios",
    "aarch64-apple-ios-sim",
    "x86_64-apple-ios",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-linux-android",
    "armv7-linux-androideabi",
    "x86_64-linux-android",
]
